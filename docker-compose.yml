services:
  api:
    build: .
    ports:
      - "8081:8081"
    env_file:
      - .env
    environment:
      ENV: production
      ALLOWED_ORIGINS: ""
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/api/v1/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
